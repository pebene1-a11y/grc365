<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Untitled Document</title>
<style>
	} #page {
	width: 1024px;
	height: 1228px;
	background: white;
	margin: 0 auto;
	border: 1px solid dimgray;
	box-shadow: 2px 3px 6px dimgray;
		} h1 {
	text-align: center;
	font-weight: normal;
	} form {
	width: 600px;
	min-height: 600px;
	padding: 24px;
	background: #A7E4A7;
	margin: 36px auto;
	border: 1px solid black;
	box-shadow: 2px 3px 6px grey;
	border-radius: 18px;
	font: 14pt/1.2em Candara;
	} fieldset {
	margin-top: 18px;
	} #personal input, #submit {
	width: 100%;
	height: 24px;
	margin-bottom: 12px;
	
	} input[type="text"] {
	width: 98%;
	font: 14pt/1.4em Candara;
	margin-top: 6px;
	} input[type="submit"] {
	width: 100px;
	height: 40px;
	background: #E8E5BE;
	margin: 6px auto;
	display: block;
	border-radius: 6px;
	border: 1px solid dimgray;
	font: 14pt/1.4em Candara;

}
	</style>
</head>

<body>
	<form action="#" method="post">
	<h1>Contact Elijah P.</h1>
	<input type="text" /><br/>
	<label>First name</label><br/> 	
	<input type="text" /><br/>
	<label>Last name</label><br/>
		<fieldset>
	<legend>Reason for contacting</legend>
	<input type="radio" name="reason"> 
	<label>Say Hello</label><br/>
	<input type="radio" name="reason"> 
	<label>Question(s)</label><br/>
	<input type="radio" name="reason"> 
	<label>Other</label><br/>
		</fieldset>
		<fieldset>
		<legend>This message is...</legend>
		<input type="checkbox">
		<label>Check all that apply</label><br/>
		<input type="checkbox">
		<label>Casual</label><br/>
		<input type="checkbox">
		<label>Formal</label><br/> 
		<input type="checkbox">
		<label>Urgent</label><br/>
		</fieldset>
		<label>Type message here</label><br/> 
		<textarea rows="5" columns="72"></textarea><br/>
		<input type="submit" />
	</form>
</body>
</html>
