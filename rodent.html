<!doctype html>
<html><head>
<meta charset="utf-8">
<title>rodent grid</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
.container {
  display: grid;
	gap: 60px 50px;
  grid-template-columns: auto auto;
  grid-template-rows: auto auto;
   justify-content: center;
  padding: auto;	
} .item1 {
	grid-row-start: 1;
	grid-row-end: 3;
	}

	} #page {
	width: 1024px;
	height: 1228px;
	background: white;
	margin: 0 auto;
	border: 1px solid dimgray;
	box-shadow: 2px 3px 6px dimgray;
	
	} h1 {
        font: 48pt/1.4em 'Open Sans';
        text-align: center;
        margin: 12px 0 0 0;
        color: darkslategrey;
        text-shadow: 2px 3px 6px darkgray;
		} p {
		font: 14pt/1.4em 'Open Sans';
		text-align:center;
			
	} img {
		width: 384px;
		length: 384px;
}
body {
}
</style>
<link href="css_rodent.css" rel="stylesheet" type="text/css">
</head>

<body>
<h1>Rodents</h1> 
	<p>Found on Pixabay - Scaled with AI</p>

		<div class="item2"><img src="guineapigs.jpg" alt="pigs"/></div>
		<div class="item3"><img src ="chuck.jpg" alt="wood"/></div>
		
	</div>
</body>
</html>
